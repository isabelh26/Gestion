apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-sql15
  namespace: gestiona
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-sql15
  template:
    metadata:
      labels:
        app: postgres-sql15
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: gestion
        - name: POSTGRES_USER
          value: admin
        - name: POSTGRES_PASSWORD
          value: admin01
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-sql15-service
  namespace: gestiona
spec:
  type: NodePort #ClusterIP #NodePort
  selector:
    app: postgres-sql15
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30001